name: iterative_scANVI
channels:
 - defaults
dependencies:
 - python=3.11
 - conda-forge::cuda-version=11.8
 - nvidia::cuda=11.8.0
 - rapidsai::rapids=24.04
 - cudnn
 - cusparselt
 - cutensor
 - pytorch::pytorch-cuda=11.8
 - pytorch::pytorch
 - conda-forge::jax=0.4.23
 - conda-forge::leidenalg
 - conda-forge::louvain
 - conda-forge::fa2
 - conda-forge::jupyterlab
 - conda-forge::wget
